<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL | DHURANDHAR FEED</title>
    <link href="https://fonts.googleapis.com/css2?family=Stalinist+One&family=Teko:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --blood-red: #bc0000;
            --alert-red: #ff0000;
            --ui-gold: #ffcc00;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            background-size: 100% 4px, 3px 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Teko', sans-serif;
            color: var(--blood-red);
            overflow: hidden;
        }
        body::before {
            content: "SIGNAL ACQUIRED... DECRYPTING FEED";
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.2rem;
            letter-spacing: 3px;
            animation: blink 0.8s infinite;
            z-index: 100;
        }
        .tactical-frame {
            position: relative;
            padding: 10px;
            border: 1px solid var(--blood-red);
            background: rgba(20, 0, 0, 0.8);
            box-shadow: 0 0 40px rgba(188, 0, 0, 0.4);
            max-width: 90%;
        }
        .tactical-frame::after,
        .tactical-frame::before {
            content: "";
            position: absolute;
            width: 40px;
            height: 40px;
            border: 4px solid var(--alert-red);
        }

        .tactical-frame::before {
            top: -5px;
            left: -5px;
            border-right: 0;
            border-bottom: 0;
        }

        .tactical-frame::after {
            bottom: -5px;
            right: -5px;
            border-left: 0;
            border-top: 0;
        }

        .video-wrapper {
            position: relative;
            width: 800px;
            max-width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            filter: contrast(1.1) saturate(1.2);
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: 10px;
            font-size: 1.4rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .rec-dot {
            width: 12px;
            height: 12px;
            background-color: var(--alert-red);
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            box-shadow: 0 0 10px var(--alert-red);
            animation: pulse 1s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.3);
                opacity: 0.7;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Mobile Adjustments */
        @media (max-width: 850px) {
            .video-wrapper {
                width: 95vw;
            }
        }
    </style>
</head>

<body>

    <div class="tactical-frame">
        <div class="video-wrapper">
            <iframe src="https://drive.google.com/file/d/1YqKvAg2ojqJ6m4j8OMbzX5cqLbapFVRR/preview?vq=hd720"
                allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>

        <div class="status-bar">
            <div><span class="rec-dot"></span>LIVE FEED: INTEL-03</div>
        </div>
    </div>

    <p style="margin-top: 20px; font-family: 'Stalinist One'; font-size: 0.8rem; letter-spacing: 5px;">
        DO NOT CLOSE TERMINAL - MISSION IN PROGRESS
    </p>

</body>

</html>
