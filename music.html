<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dhurandhar Music Player</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-image: linear-gradient(rgba(8, 7, 7, 0.7), rgba(0, 0, 0, 0.9)),
                url(https://technosports.co.in/wp-content/uploads/2025/12/Dhurandhar-1-1024x675.jpg);
            background-size: cover;
            background-attachment: fixed;
        }

        h1 {
            color: #ff0000;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.5rem;
            margin-bottom: 15px;
            border-bottom: 2px solid #ff0000;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
        }

        .video-container {
            width: 100%;
            max-width: 450px;
            margin-bottom: 20px;
            background: #000;
            border: 2px solid #ff0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
            border-radius: 8px;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 200px;
            display: block;
            border: none;
        }

        .now-playing {
            padding: 8px;
            font-size: 0.9rem;
            text-align: center;
            background: rgba(255, 0, 0, 0.2);
            font-weight: bold;
            color: #fff;
        }

        table {
            width: 95%;
            max-width: 600px;
            font-size: 0.85rem;
            background: rgba(20, 20, 20, 0.95);
            border-collapse: collapse;
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #333;
            text-align: left;
        }

        thead {
            background-color: #ff0000;
        }

        .play-btn {
            color: #ffffff;
            background-color: #b30000;
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .play-btn:hover {
            background-color: #ff0000;
            box-shadow: 0 0 10px #ff0000;
        }

        td:last-child {
            text-align: center;
        }
    </style>
</head>

<body>

    <h1>ALL SONGS OF DHURANDHAR</h1>

    <div class="video-container">
        <div class="now-playing" id="videoTitle">Ready to Play</div>
        <iframe id="mainPlayer" src="" allow="autoplay" allowfullscreen></iframe>
    </div>

    <table>
        <thead>
            <tr>
                <th>SONG NAME</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>DHURANDHAR TITLE TRACK</td>
                <td><button class="play-btn" onclick="playSong('https://drive.google.com/file/d/1MkFzlr6Iz1RVv4vmeB-dBKB9y-6WDXC0/preview', 'DHURANDHAR TITLE TRACK')">PLAY NOW</button></td>
            </tr>
            <tr>
                <td>ISHQ JALAKAR</td>
                <td><button class="play-btn" onclick="playSong('https://drive.google.com/file/d/11lB6sKp4RHZE5UAOJJ1McvdoAeW-Pg73/preview', 'ISHQ JALAKAR')">PLAY NOW</button></td>
            </tr>
            <tr>
                <td>RAMBA HO</td>
                <td><button class="play-btn" onclick="playSong('https://drive.google.com/file/d/10LyckbsCPf2YK1VCXFEWV4eu7ivXbinT/preview', 'RAMBA HO')">PLAY NOW</button></td>
            </tr>
            <tr>
                <td>LUT LE GAYA</td>
                <td><button class="play-btn" onclick="playSong('https://drive.google.com/file/d/1kmjoc-AlakrmpJCPG8y5v4fOwrn18a_1/preview', 'LUT LE GAYA')">PLAY NOW</button></td>
            </tr>
            <tr>
                <td>MOVE ISHQ ISHQ</td>
                <td><button class="play-btn" onclick="playSong('https://drive.google.com/file/d/1MrBSIaq1JrpD-8OSwsPEmLkowoE2xuTY/preview', 'MOVE ISHQ ISHQ')">PLAY NOW</button></td>
            </tr>
            <tr>
                <td>GEHRA HUA</td>
                <td><button class="play-btn" onclick="playSong('https://drive.google.com/file/d/1ITUQp0PTdLJg6XvueqtkONx09boxLWfY/preview', 'GEHRA HUA')">PLAY NOW</button></td>
            </tr>
            <tr>
                <td>HAWA HAWA</td>
                <td><button class="play-btn" onclick="playSong('https://drive.google.com/file/d/1Chz3Qr1GIr80DmeQ6CskvIJ1LAZPTJts/preview', 'HAWA HAWA')">PLAY NOW</button></td>
            </tr>
            <tr>
                <td>SHARARAT</td>
                <td><button class="play-btn" onclick="playSong('https://drive.google.com/file/d/1mE77Zv6f6mnXVRc7cYGtB3ZqtqGPVso_/view?usp=sharing', 'SHARARAT')">PLAY NOW</button></td>
            </tr>
            <tr>
                <td>NAAL NACHNA</td>
                <td><button class="play-btn" onclick="playSong('https://drive.google.com/file/d/16HnbXsMUg6BkVxr1DwAxIeOEW9sPgHoR/preview', 'NAAL NACHNA')">PLAY NOW</button></td>
            </tr>
        </tbody>
    </table>

    <script>
        function playSong(driveLink, title) {
            const player = document.getElementById('mainPlayer');
            const titleDisplay = document.getElementById('videoTitle');
            
            // Set the new source
            player.src = driveLink;
            titleDisplay.innerText = "Now Playing: " + title;
            
            // Smoothly scroll back to the player so you can see the video
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>

</body>

</html>
