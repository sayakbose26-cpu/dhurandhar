<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Dhurandhar</title>
    <style>
        :root {
            --netflix-red: #E50914;
            --dark-bg: #000000;
            --card-bg: #141414;
            --text-gray: #b3b3b3;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--dark-bg);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .contact-container {
            max-width: 900px;
            width: 90%;
            text-align: center;
        }

        .header-section {
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-gray);
            font-size: 1.1rem;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .contact-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 8px;
            border: 1px solid #333;
            transition: transform 0.3s ease, border-color 0.3s ease;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .contact-card:hover {
            transform: scale(1.02);
            border-color: var(--netflix-red);
            background: #1f1f1f;
        }

        .icon-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(229, 9, 20, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .icon-circle svg {
            width: 30px;
            fill: var(--netflix-red);
        }

        h3 {
            font-size: 1.4rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .phone-number {
            font-size: 1.2rem;
            color: var(--netflix-red);
            font-weight: bold;
            margin: 15px 0;
            letter-spacing: 2px;
        }

        .description {
            color: var(--text-gray);
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .btn-call {
            margin-top: 20px;
            background: var(--netflix-red);
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .back-link {
            display: inline-block;
            margin-top: 50px;
            color: var(--text-gray);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="contact-container">
        <div class="header-section">
            <h1>Contact Support</h1>
            <p class="subtitle">Can't wait for the release? Get the intel you need.</p>
        </div>

        <div class="contact-grid">
            <div class="contact-card">
                <div class="icon-circle">
                    <svg viewBox="0 0 24 24"><path d="M6.62 10.79a15.053 15.053 0 006.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                </div>
                <h3>Call for Spoilers</h3>
                <p class="description">Speak with an agent to uncover classified plot details and leaks.</p>
                <div class="phone-number">7872783435</div>
                <a href="tel:7872783435" class="btn-call">Call Now</a>
            </div>

            <div class="contact-card">
                <div class="icon-circle">
                    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-5H6V7h12v2z"/></svg>
                </div>
                <h3>Live Intelligence</h3>
                <p class="description">Chat with our undercover team for real-time mission updates.</p>
                <a href="#" class="btn-call" style="background: transparent; border: 1px solid white;">Start Chat</a>
            </div>
        </div>

        <a href="front.html" class="back-link">← Return to Dhurandhar Home</a>
    </div>

</body>
</html>
