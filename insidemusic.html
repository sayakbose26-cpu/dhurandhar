<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dhurandhar</title>

    <style>
        :root {
            --blood-red: #bc0000;
            --dark-bg: #080808;
            --hazard-yellow: #ffd700;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--dark-bg);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            background: radial-gradient(circle, rgba(0, 0, 0, 0.2) 0%, #000 90%);
        }

        .hero iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            transform: translate(-50%, -50%);
            z-index: -2;
            filter: grayscale(40%) brightness(0.5);
        }

        .hero-box h1 {
            font-size: clamp(30px, 10vw, 80px);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 10px;
            background: linear-gradient(to bottom, #fff 30%, #666 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            line-height: 1.1;
        }

        button {
            background-color: var(--blood-red);

            color: white;

            border: none;

            padding: 18px 45px;

            font-size: 14px;

            font-weight: 900;

            letter-spacing: 4px;

            text-transform: uppercase;

            cursor: pointer;

            border-radius: 2px;

            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);

            position: relative;

            overflow: hidden;

            margin-top: 25px;

            box-shadow: 0 4px 15px rgba(179, 0, 0, 0.3);

        }



        button:hover {

            background-color: #ff0000;

            transform: scale(1.05) translateY(-2px);

            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);

            letter-spacing: 6px;
        }

        button:hover {
            background: #ff0000;
            box-shadow: 0 0 25px var(--blood-red);
            transform: skew(-5deg) scale(1.05);
        }

        .cards {

            display: flex;

            justify-content: center;

            flex-wrap: wrap;

            gap: 30px;

            padding: 60px 20px;

        }



        .card {

            width: 300px;

            height: 300px;

            border-radius: 4px;

            overflow: hidden;

            position: relative;

            border: 1px solid #333;

            transition: 0.5s ease;

            cursor: pointer;

        }



        .card:hover {

            transform: translateY(-15px);

            border-color: var(--blood-red);

            box-shadow: 0 0 30px rgba(179, 0, 0, 0.4);

        }



        .card img {

            width: 100%;

            height: 100%;

            object-fit: cover;

            filter: grayscale(40%) contrast(1.2);

            transition: 0.5s;

        }



        .card:hover img {

            filter: grayscale(0%) contrast(1);

        }

        @media (max-width: 768px) {
            .hero-box h1 {
                letter-spacing: 4px;
            }

            .logo {
                font-size: 12px;
                letter-spacing: 2px;
                position: absolute;
                top: 20px;
            }

        }
        h3 {
            color: var(--blood-red);
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(188, 0, 0, 0.6);
        }
        footer {
            background: #000;
            color: #444;
            text-align: center;
            padding: 40px;
            letter-spacing: 15px;
            font-weight: 900;
            font-size: 20px;
            border-top: 2px solid var(--blood-red);
            width: 100%;
            text-transform: uppercase;
        }
        @media (max-width: 768px) {
            footer {
                font-size: 14px;
                letter-spacing: 8px;
                padding: 30px 10px;
            }
        }
    </style>
</head>
