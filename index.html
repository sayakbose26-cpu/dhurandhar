<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRONT</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            background-image: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0.2) 50%, rgba(0, 0, 0, 0.8) 100%),
                url('https://www.bollywoodhungama.com/wp-content/uploads/2025/06/Dhurandhar-cover-image129.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            display: flex;
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        header {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 15px 50px;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            box-sizing: border-box;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        header nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            background-color: #b20710;
            padding: 8px 18px;
            border-radius: 50px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        header nav a:hover {
            background-color: #E50914;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.5);
        }
        h1 {
            font-family: 'Arial Black', sans-serif;
            font-size: 5rem; 
            font-weight: 900;
            margin: 0 0 15px 0; 
            text-transform: uppercase;
            letter-spacing: -3px;
            line-height: 1;
            text-align: center;
            
            background: linear-gradient(180deg, #ffffff 20%, #ea4747 55%, #7a0505 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.8));
            transition: 0.5s ease;
        }

        
        form {
            max-width: 550px;
            width: 90%;
            padding: 45px;
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px; 
            text-align: center; 
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.7);
        }

        h2 {
            font-size: 1.1rem;
            color: #e9e512;
            margin-top: 0;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: 800;
        }

        .tagline {
            font-size: 1.6rem;
            font-weight: 300;
            margin: 10px 0 30px 0;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.9);
        }

        button {
            background-color: #b20710;
            color: white;
            border: none;
            padding: 16px 50px;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 50px; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-bottom: 25px;
            box-shadow: 0 8px 25px rgba(178, 7, 16, 0.4);
        }

        button:hover {
            background-color: #ff0000;
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 15px 35px rgba(229, 9, 20, 0.6);
        }

        h3 {
            font-size: 0.8rem;
            margin: 8px 0;
            color: rgba(255, 255, 255, 0.5); 
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h3:hover {
            color: #fff;
        }

        @media (max-width: 768px) {
            h1 { font-size: 3rem; }
            form { padding: 30px; }
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <a href="login page.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="login page.html">Sign in</a>
            <a href="form.html">Sign up</a>
        </nav>
    </header>

    <h1>DHURANDHAR HUB</h1>

    <form action="login page.html">
        <h2>Ab Bigarne ka waqt agaya</h2>
        <div class="tagline">HAUSLA ENDHEN BADLA</div>

        <button>GET STARTED</button>

        <h3>Director: Aditya Dhar</h3>
        <h3>Genres: Action, Mystery, Thriller</h3>
        <h3>Country: India</h3>
    </form>

    <audio id="bgMusic" loop preload="auto">
        <source src="AARI AARI – Dhurandhar 2 _ Ran-Downringtone.com.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('bgMusic');
        const startMusic = () => {
            audio.play().catch(err => console.log("Audio blocked: ", err));
        };
        window.addEventListener('click', startMusic, { once: true });
        window.addEventListener('keydown', startMusic, { once: true });
    </script>
</body>

</html>
