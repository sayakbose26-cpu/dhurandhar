<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(-45deg, #ff0055, #00fbff, #7000ff, #ffcc00);
        background-size: 400% 400%;
        animation: dhurandharFlow 10s ease infinite;
        font-family: 'Poppins', sans-serif;
    }

    @keyframes dhurandharFlow {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    form {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
        border: 2px solid rgba(255, 255, 255, 0.1);
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        width: 350px;
        color: white;
    }

    div {
        margin-bottom: 15px;
    }

    label {
        display: block;
        margin-bottom: 5px;
        font-weight: 600;
        text-transform: uppercase;
        font-size: 12px;
        letter-spacing: 1px;
    }

    input, select {
        width: 100%;
        padding: 12px;
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 8px;
        color: white;
        outline: none;
        transition: 0.3s;
        box-sizing: border-box;
    }

    input:focus, select:focus {
        border-color: #00fbff;
        box-shadow: 0 0 15px rgba(0, 251, 255, 0.6);
        background: rgba(0, 0, 0, 0.4);
    }

    button {
        width: 100%;
        padding: 15px;
        margin-top: 10px;
        border: none;
        border-radius: 50px;
        background: #00fbff;
        color: #000;
        font-weight: 800;
        text-transform: uppercase;
        cursor: pointer;
        transition: 0.4s;
        box-shadow: 0 5px 15px rgba(0, 251, 255, 0.4);
    }

    button:hover {
        background: #ff0055;
        color: #fff;
        transform: scale(1.05);
        box-shadow: 0 5px 25px rgba(255, 0, 85, 0.6);
    }

    input::-webkit-calendar-picker-indicator {
        filter: invert(1);
    }
    
    select option {
        background: #222;
        color: #fff;
    }
</style>
</head>

<body>
    <form action="login page.html">
        <h1>account updated successfully</h1>
        <div>
            <button type="go back">go back</button>
        </div>
    </form>
</body>

</html>
