<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTRY | DHURANDHAR</title>
    <link href="https://fonts.googleapis.com/css2?family=Stalinist+One&family=Teko:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blood-red: #bc0000;
            --dark-black: #080808;
            --field-bg: rgba(20, 20, 20, 0.9);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Teko', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)),
                url(https://images.indianexpress.com/2025/12/Dhurandhar-blog-1600.jpg);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            text-transform: uppercase;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(255, 0, 0, 0.03) 0px, rgba(255, 0, 0, 0.03) 1px, transparent 2px);
            pointer-events: none;
            z-index: 10;
        }

        form {
            background: var(--field-bg);
            border: 1px solid #333;
            border-left: 5px solid var(--blood-red);
            padding: 30px;
            width: 320px;
            position: relative;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            z-index: 5;
        }
        form::after {
            content: "CLASSIFIED";
            position: absolute;
            top: -15px;
            right: 10px;
            background: var(--blood-red);
            color: black;
            font-size: 0.8rem;
            padding: 2px 10px;
            font-family: 'Stalinist One', cursive;
        }

        h2 {
            font-family: 'Stalinist One', cursive;
            font-size: 1.2rem;
            color: var(--blood-red);
            margin: 0 0 25px 0;
            text-align: center;
            letter-spacing: 1px;
        }

        div {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 1rem;
            letter-spacing: 1px;
            color: #888;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            background: #111;
            border: 1px solid #444;
            color: white;
            font-family: 'Teko', sans-serif;
            font-size: 1.2rem;
            transition: 0.3s;
            box-sizing: border-box;
            outline: none;
        }
        input:focus,
        select:focus {
            border-color: var(--blood-red);
            background: #1a1a1a;
            box-shadow: 0 0 10px rgba(188, 0, 0, 0.3);
        }
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            background: var(--blood-red);
            color: white;
            font-family: 'Teko', sans-serif;
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
        }

        button:hover {
            background: #ff0000;
            box-shadow: 0 0 20px #ff0000;
            letter-spacing: 5px;
            transform: translateY(-2px);
        }

        select option {
            background: #111;
            color: white;
        }
    </style>
</head>

<body>
    <form action="submit.html">
        <h2>NEW OPERATIVE</h2>
        
        <div>
            <label for="name">Code Name</label>
            <input id="name" type="text" placeholder="Enter Full Name" required>
        </div>

        <div>
            <label for="ph">Comm-Link (Phone)</label>
            <input id="ph" type="tel" placeholder="+91 XXXXX XXXXX" required>
        </div>

        <div>
            <label for="dob">Date of Birth</label>
            <input id="dob" type="date" required>
        </div>

        <div>
            <label for="gender">Classification</label>
            <select id="gender" required>
                <option value="" disabled selected>Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>
        </div>

        <div>
            <label for="password">Security Passcode</label>
            <input id="password" type="password" placeholder="Set Password" required>
        </div>

        <div>
            <button type="submit">REGISTER PROFILE</button>
        </div>
    </form>
</body>

</html>
