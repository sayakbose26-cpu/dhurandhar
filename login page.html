<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL | DHCP-01</title>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blood-red: #bc0000;
            --terminal-gray: #1a1a1a;
            --status-ok: #00ff41;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Teko', sans-serif;
            color: #ccc;
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)),
                        url('https://img.nowrunning.com/content/movie/2025/dhura-31080/bg4_dhurandhar.jpg');
            background-size: cover;
            background-position: center;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(transparent 50%, rgba(0,0,0,0.15) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }

        .login-terminal {
            background: rgba(10, 10, 10, 0.95);
            border: 2px solid var(--blood-red);
            width: 280px;
            padding: 20px;
            text-align: center;
            position: relative;
            box-shadow: 0 0 30px rgba(188, 0, 0, 0.3), 0 0 10px rgba(0,0,0,1);
            z-index: 5;
            clip-path: polygon(0 0, 95% 0, 100% 10%, 100% 100%, 5% 100%, 0 90%);
        }
        .user-pic {
            width: 60px;
            height: 60px;
            background-color: #333;
            border: 2px solid #555;
            border-radius: 50%;
            margin: 0 auto 15px auto;
            position: relative;
            background-image: url('https://icons.iconarchive.com/icons/paomedia/small-n-flat/128/user-male-alt-icon.png'); /* Generic Placeholder */
            background-size: cover;
            box-shadow: 0 0 10px rgba(0,0,0,0.8);
        }
        .user-pic::after {
            content: "";
            position: absolute;
            bottom: -2px;
            right: 0;
            width: 12px;
            height: 12px;
            background-color: var(--status-ok);
            border: 2px solid var(--terminal-gray);
            border-radius: 50%;
            box-shadow: 0 0 5px var(--status-ok);
            animation: pulse 1.5s infinite;
        }

        h1 {
            font-size: 1.4rem;
            color: var(--blood-red);
            margin: 0 0 10px 0;
            letter-spacing: 2px;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
        }

        .status-header {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            margin-bottom: 15px;
            background: #111;
            border: 1px solid #444;
            color: white;
            font-family: 'Teko', sans-serif;
            font-size: 1.1rem;
            outline: none;
            transition: 0.2s;
            clip-path: polygon(0 0, 100% 0, 98% 100%, 2% 100%);
        }

        input:focus {
            border-color: #999;
            box-shadow: 0 0 10px rgba(188, 0, 0, 0.4);
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            background: var(--blood-red);
            color: white;
            font-family: 'Teko', sans-serif;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
        }

        button:hover {
            background: #ff0000;
            box-shadow: 0 0 20px #ff0000;
            letter-spacing: 3px;
        }

        .terminal-footer {
            margin-top: 25px;
            border-top: 1px solid #444;
            padding-top: 10px;
            font-size: 0.9rem;
            color: #888;
        }

        a {
            color: #eee;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
        }

        a:hover {
            color: var(--blood-red);
            text-shadow: 0 0 10px var(--blood-red);
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

    </style>
</head>

<body>
    <div class="login-terminal">
        <div class="user-pic"></div>

        <h1>SYSTEM ACCESS</h1>
        <div class="status-header">DHURANDHAR</div>

        <form action="home.html">
            <input id="name" type="text" placeholder="OPERATOR ID" required>
            <input id="password" type="password" placeholder="PASSCODE" required>
            <button type="submit">EXECUTE LOGIN</button>
        </form>
        
        <div class="terminal-footer">
            No Profile? <a href="form.html">Create Operative</a>
        </div>
    </div>
</body>

</html>
